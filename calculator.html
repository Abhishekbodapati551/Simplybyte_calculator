```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Calculator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#141e30,#243b55);
}

.calculator{
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(15px);
    -webkit-backdrop-filter:blur(15px);
    padding:25px;
    border-radius:25px;
    box-shadow:0 8px 32px rgba(0,0,0,0.4);
    border:1px solid rgba(255,255,255,0.15);
}

#result{
    width:100%;
    height:75px;
    border:none;
    outline:none;
    border-radius:15px;
    margin-bottom:20px;
    font-size:2rem;
    text-align:right;
    padding:0 15px;
    background:rgba(255,255,255,0.12);
    color:white;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(4,75px);
    gap:12px;
}

.buttons button{
    height:70px;
    border:none;
    border-radius:15px;
    font-size:1.3rem;
    cursor:pointer;
    color:white;
    transition:all 0.2s ease;
}

.buttons button:hover{
    transform:translateY(-3px);
}

.buttons button:active{
    transform:scale(0.95);
}

/* Number Colors */

.zero{
    background:#ff6b6b;
}

.one{
    background:#6c5ce7;
}

.two{
    background:#0984e3;
}

.three{
    background:#00b894;
}

.four{
    background:#fdcb6e;
    color:black;
}

.five{
    background:#e17055;
}

.six{
    background:#f1c40f;
    color:black;
}

.seven{
    background:#8e44ad;
}

.eight{
    background:#16a085;
}

.nine{
    background:#d63031;
}

/* Operators */

.operator{
    background:#ff9800;
}

.plus{
    color:#00ff00;
    font-weight:bold;
    font-size:1.6rem;
}

.minus{
    color:#ff0000;
    font-weight:bold;
    font-size:1.6rem;
}

.equal{
    background:#00c853;
    grid-column:span 2;
}

.clear{
    background:#ff1744;
    grid-column:span 2;
}

@media(max-width:450px){
    .buttons{
        grid-template-columns:repeat(4,65px);
    }

    .buttons button{
        height:60px;
    }
}
</style>
</head>

<body>

<div class="calculator">
    <input type="text" id="result" disabled>

    <div class="buttons">
        <button class="seven" onclick="appendValue('7')">7</button>
        <button class="eight" onclick="appendValue('8')">8</button>
        <button class="nine" onclick="appendValue('9')">9</button>
        <button class="operator" onclick="appendValue('/')">÷</button>

        <button class="four" onclick="appendValue('4')">4</button>
        <button class="five" onclick="appendValue('5')">5</button>
        <button class="six" onclick="appendValue('6')">6</button>
        <button class="operator" onclick="appendValue('*')">×</button>

        <button class="one" onclick="appendValue('1')">1</button>
        <button class="two" onclick="appendValue('2')">2</button>
        <button class="three" onclick="appendValue('3')">3</button>
        <button class="operator minus" onclick="appendValue('-')">−</button>

        <button class="zero" onclick="appendValue('0')">0</button>
        <button onclick="appendValue('.')">.</button>
        <button class="equal" onclick="calculate()">=</button>
        <button class="operator plus" onclick="appendValue('+')">+</button>

        <button class="clear" onclick="clearResult()">C</button>
    </div>
</div>

<script>
const result = document.getElementById('result');

function appendValue(val){
    result.value += val;
}

function calculate(){
    try{
        result.value = eval(result.value);
    }
    catch{
        result.value = "Error";
    }
}

function clearResult(){
    result.value = '';
}
</script>

</body>
</html>
